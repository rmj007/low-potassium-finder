name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Set your free USDA API key as a GitHub repository secret named VITE_USDA_API_KEY
          # Settings → Secrets and variables → Actions → New repository secret
          VITE_USDA_API_KEY: ${{ secrets.VITE_USDA_API_KEY }}
          # Must match your GitHub repository name exactly
          VITE_BASE_PATH: /low-potassium-finder/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
